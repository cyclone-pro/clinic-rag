services:
  backend-cloudflare:
    image: node:20-bookworm-slim
    container_name: clinicdocs-backend-cloudflare
    working_dir: /app
    env_file:
      - .env
    command:
      - sh
      - -c
      - |
        apt-get update
        apt-get install -y --no-install-recommends ca-certificates
        update-ca-certificates
        env | grep -E '^(SUPABASE_URL|SUPABASE_ANON_KEY|SUPABASE_SERVICE_KEY)=' > .dev.vars
        npm install --include=optional
        npm exec -- wrangler dev --ip 0.0.0.0 --port 8787 --persist-to /app/.wrangler/state
    ports:
      - "8787:8787"
    volumes:
      - ./backend-cloudflare:/app
      - backend_cloudflare_node_modules:/app/node_modules
      - backend_cloudflare_wrangler:/app/.wrangler

  frontend:
    image: node:20-alpine
    container_name: clinicdocs-frontend
    working_dir: /app
    depends_on:
      - backend-cloudflare
    environment:
      VITE_API_BASE_URL: http://localhost:8787
    command: sh -c "npm install && npm run dev"
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules

volumes:
  backend_cloudflare_node_modules:
  backend_cloudflare_wrangler:
  frontend_node_modules:
