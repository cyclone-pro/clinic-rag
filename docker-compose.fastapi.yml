  #     - pgdata:/var/lib/postgresql/data
  #   healthcheck:
  #     test: ["CMD-SHELL", "pg_isready -U postgres -d clinicdocs"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 5

  backend:
    build:
      context: ./backend
    container_name: clinicdocs-backend
    env_file:
      - .env
    # depends_on:
    #   db:
    #     condition: service_healthy
    ports:
      - "8000:8000"
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend/app:/app/app
      - ./backend/migrations:/app/migrations
      - ./backend/data:/app/data

  frontend:
    image: node:20-alpine
    container_name: clinicdocs-frontend
    working_dir: /app
    depends_on:
      - backend
    env_file:
      - .env
    command: sh -c "npm install && npm run dev"
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app

